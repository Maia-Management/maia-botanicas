<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 750" role="img" aria-labelledby="hero-title" preserveAspectRatio="xMidYMid slice">
  <title id="hero-title">Maia Botánicas apothecary shelf — Caribbean dispensary illustration</title>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F4EDE0"/>
      <stop offset="100%" stop-color="#E5D5BC"/>
    </linearGradient>
    <linearGradient id="bottle-amber" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C9A961"/>
      <stop offset="100%" stop-color="#8B5E3C"/>
    </linearGradient>
    <linearGradient id="bottle-green" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4A7A5A"/>
      <stop offset="100%" stop-color="#2E5C3F"/>
    </linearGradient>
    <linearGradient id="bottle-brown" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8B5E3C"/>
      <stop offset="100%" stop-color="#5C3B25"/>
    </linearGradient>
    <linearGradient id="bottle-clear" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FAF5EB"/>
      <stop offset="100%" stop-color="#D4C5AA"/>
    </linearGradient>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="60%" stop-color="rgba(31,24,20,0)"/>
      <stop offset="100%" stop-color="rgba(31,24,20,0.22)"/>
    </radialGradient>
    <pattern id="paper-grain" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <rect width="60" height="60" fill="none"/>
      <circle cx="14" cy="22" r="0.7" fill="#8B5E3C" opacity="0.08"/>
      <circle cx="42" cy="48" r="0.5" fill="#5C3B25" opacity="0.08"/>
      <circle cx="50" cy="10" r="0.4" fill="#C9A961" opacity="0.1"/>
      <circle cx="6"  cy="55" r="0.6" fill="#8B5E3C" opacity="0.06"/>
    </pattern>
  </defs>

  <!-- background parchment -->
  <rect width="600" height="750" fill="url(#paper)"/>
  <rect width="600" height="750" fill="url(#paper-grain)"/>

  <!-- decorative double border -->
  <rect x="22" y="22" width="556" height="706" fill="none" stroke="#5C3B25" stroke-width="1.6"/>
  <rect x="32" y="32" width="536" height="686" fill="none" stroke="#5C3B25" stroke-width="0.6"/>

  <!-- header band -->
  <g transform="translate(60,72)">
    <text x="0" y="0" font-family="Cormorant Garamond, Georgia, serif" font-style="italic" font-size="14" fill="#8B5E3C" letter-spacing="3">EST. SANTA MARTA · MMXXVI</text>
    <text x="0" y="36" font-family="Cormorant Garamond, Georgia, serif" font-size="46" fill="#1F1814" font-weight="600">Maia</text>
    <text x="0" y="78" font-family="Cormorant Garamond, Georgia, serif" font-size="46" fill="#1F1814" font-weight="600">Botánicas</text>
    <line x1="0" y1="98" x2="180" y2="98" stroke="#5C3B25" stroke-width="1.2"/>
    <text x="0" y="120" font-family="Cormorant Garamond, Georgia, serif" font-style="italic" font-size="16" fill="#4A3D32">Apothecary &amp; Bar Supply</text>
  </g>

  <!-- shelf -->
  <g transform="translate(0,340)">
    <rect x="40" y="180" width="520" height="14" fill="#5C3B25"/>
    <rect x="40" y="194" width="520" height="6" fill="#1F1814" opacity="0.4"/>

    <!-- Bottle 1 — amber tare -->
    <g transform="translate(100,40)">
      <rect x="0" y="20" width="50" height="140" rx="4" fill="url(#bottle-amber)"/>
      <rect x="14" y="0" width="22" height="22" rx="2" fill="#5C3B25"/>
      <rect x="6" y="22" width="38" height="6" fill="#1F1814" opacity="0.4"/>
      <!-- label -->
      <rect x="4" y="60" width="42" height="58" fill="#FAF5EB" stroke="#5C3B25" stroke-width="0.8"/>
      <text x="25" y="76" text-anchor="middle" font-family="Cormorant Garamond, Georgia, serif" font-size="9" fill="#5C3B25" font-style="italic">Tare</text>
      <text x="25" y="90" text-anchor="middle" font-family="Cormorant Garamond, Georgia, serif" font-size="7" fill="#5C3B25">Yakitori</text>
      <line x1="10" y1="98" x2="40" y2="98" stroke="#8B5E3C" stroke-width="0.4"/>
      <text x="25" y="108" text-anchor="middle" font-family="Inter, sans-serif" font-size="5.5" fill="#8B5E3C" letter-spacing="0.5">℞ KOJI 14d</text>
      <!-- wax seal -->
      <circle cx="25" cy="140" r="6" fill="#8B5E3C"/>
      <text x="25" y="143" text-anchor="middle" font-family="Cormorant Garamond, Georgia, serif" font-size="8" fill="#FAF5EB" font-weight="bold">M</text>
    </g>

    <!-- Bottle 2 — green miso jar -->
    <g transform="translate(180,55)">
      <rect x="0" y="20" width="60" height="125" rx="6" fill="url(#bottle-green)"/>
      <rect x="6" y="6" width="48" height="20" rx="3" fill="#2E5C3F"/>
      <rect x="2" y="22" width="56" height="6" fill="#1F1814" opacity="0.35"/>
      <rect x="6" y="55" width="48" height="50" fill="#FAF5EB" stroke="#2E5C3F" stroke-width="0.8"/>
      <text x="30" y="73" text-anchor="middle" font-family="Cormorant Garamond, Georgia, serif" font-size="10" fill="#2E5C3F" font-style="italic">Miso</text>
      <text x="30" y="86" text-anchor="middle" font-family="Cormorant Garamond, Georgia, serif" font-size="7" fill="#2E5C3F">Caribeño</text>
      <line x1="12" y1="92" x2="48" y2="92" stroke="#4A7A5A" stroke-width="0.4"/>
      <text x="30" y="101" text-anchor="middle" font-family="Inter, sans-serif" font-size="5" fill="#4A7A5A" letter-spacing="0.5">EN CASA</text>
      <circle cx="30" cy="125" r="6" fill="#2E5C3F"/>
      <text x="30" y="128" text-anchor="middle" font-family="Cormorant Garamond, Georgia, serif" font-size="8" fill="#FAF5EB" font-weight="bold">M</text>
    </g>

    <!-- Bottle 3 — dark brown bitters (tall) -->
    <g transform="translate(280,20)">
      <rect x="0" y="30" width="36" height="160" rx="3" fill="url(#bottle-brown)"/>
      <rect x="8" y="10" width="20" height="22" rx="2" fill="#1F1814"/>
      <rect x="14" y="0" width="8" height="10" fill="#5C3B25"/>
      <rect x="4" y="32" width="28" height="4" fill="#1F1814" opacity="0.5"/>
      <rect x="3" y="80" width="30" height="60" fill="#FAF5EB" stroke="#5C3B25" stroke-width="0.8"/>
      <text x="18" y="95" text-anchor="middle" font-family="Cormorant Garamond, Georgia, serif" font-size="8" fill="#5C3B25" font-style="italic">Bitters</text>
      <text x="18" y="106" text-anchor="middle" font-family="Cormorant Garamond, Georgia, serif" font-size="6" fill="#5C3B25">Café &amp; Cacao</text>
      <line x1="8" y1="112" x2="28" y2="112" stroke="#8B5E3C" stroke-width="0.4"/>
      <text x="18" y="122" text-anchor="middle" font-family="Inter, sans-serif" font-size="4.5" fill="#8B5E3C" letter-spacing="0.5">℞ 100 ml</text>
      <circle cx="18" cy="170" r="5" fill="#5C3B25"/>
      <text x="18" y="172.5" text-anchor="middle" font-family="Cormorant Garamond, Georgia, serif" font-size="7" fill="#FAF5EB" font-weight="bold">M</text>
    </g>

    <!-- Bottle 4 — clear hibiscus syrup -->
    <g transform="translate(345,30)">
      <path d="M0,180 L0,90 Q0,75 8,68 L8,32 Q8,28 12,28 L36,28 Q40,28 40,32 L40,68 Q48,75 48,90 L48,180 Z" fill="url(#bottle-clear)" stroke="#8B5E3C" stroke-width="0.6"/>
      <rect x="14" y="8" width="20" height="22" rx="2" fill="#5C3B25"/>
      <!-- liquid inside (hibiscus magenta but muted to fit palette) -->
      <path d="M2,180 L2,110 L46,110 L46,180 Z" fill="#A33F2E" opacity="0.35"/>
      <rect x="6" y="120" width="36" height="42" fill="#FAF5EB" stroke="#8B5E3C" stroke-width="0.8" opacity="0.95"/>
      <text x="24" y="135" text-anchor="middle" font-family="Cormorant Garamond, Georgia, serif" font-size="8.5" fill="#5C3B25" font-style="italic">Hibisco</text>
      <text x="24" y="146" text-anchor="middle" font-family="Cormorant Garamond, Georgia, serif" font-size="6.5" fill="#5C3B25">Clarificado</text>
      <line x1="10" y1="151" x2="38" y2="151" stroke="#8B5E3C" stroke-width="0.4"/>
      <text x="24" y="159" text-anchor="middle" font-family="Inter, sans-serif" font-size="4.5" fill="#8B5E3C" letter-spacing="0.5">500 ml</text>
    </g>

    <!-- Bottle 5 — small jar (mango tuahine) -->
    <g transform="translate(420,80)">
      <rect x="0" y="20" width="44" height="95" rx="6" fill="url(#bottle-amber)" opacity="0.85"/>
      <rect x="4" y="6" width="36" height="18" rx="2" fill="#5C3B25"/>
      <rect x="2" y="22" width="40" height="5" fill="#1F1814" opacity="0.4"/>
      <rect x="3" y="44" width="38" height="50" fill="#FAF5EB" stroke="#5C3B25" stroke-width="0.8"/>
      <text x="22" y="60" text-anchor="middle" font-family="Cormorant Garamond, Georgia, serif" font-size="9" fill="#5C3B25" font-style="italic">Tuahine</text>
      <text x="22" y="72" text-anchor="middle" font-family="Cormorant Garamond, Georgia, serif" font-size="6.5" fill="#5C3B25">Mango</text>
      <line x1="9" y1="78" x2="35" y2="78" stroke="#8B5E3C" stroke-width="0.4"/>
      <text x="22" y="88" text-anchor="middle" font-family="Inter, sans-serif" font-size="5" fill="#8B5E3C" letter-spacing="0.5">PICANTE</text>
    </g>

    <!-- Bottle 6 — black garlic small -->
    <g transform="translate(478,98)">
      <circle cx="20" cy="60" r="36" fill="url(#bottle-brown)"/>
      <ellipse cx="20" cy="25" rx="14" ry="8" fill="#5C3B25"/>
      <rect x="6" y="56" width="28" height="22" fill="#FAF5EB" stroke="#5C3B25" stroke-width="0.6"/>
      <text x="20" y="67" text-anchor="middle" font-family="Cormorant Garamond, Georgia, serif" font-size="7" fill="#5C3B25" font-style="italic">Ajo Negro</text>
      <text x="20" y="75" text-anchor="middle" font-family="Inter, sans-serif" font-size="4" fill="#8B5E3C" letter-spacing="0.4">40 DÍAS</text>
    </g>

    <!-- shelf shadow under bottles -->
    <ellipse cx="300" cy="178" rx="240" ry="6" fill="#1F1814" opacity="0.18"/>
  </g>

  <!-- ribbon / Rx stamp top right -->
  <g transform="translate(420,80) rotate(-7)">
    <rect x="0" y="0" width="120" height="58" fill="#FAF5EB" stroke="#5C3B25" stroke-width="1.4"/>
    <text x="60" y="22" text-anchor="middle" font-family="Cormorant Garamond, Georgia, serif" font-size="22" fill="#5C3B25" font-weight="600">℞</text>
    <text x="60" y="40" text-anchor="middle" font-family="Cormorant Garamond, Georgia, serif" font-size="9" fill="#5C3B25" letter-spacing="2">COMPOUNDED</text>
    <text x="60" y="51" text-anchor="middle" font-family="Cormorant Garamond, Georgia, serif" font-size="8" fill="#8B5E3C" letter-spacing="2">SANTA MARTA</text>
  </g>

  <!-- botanical sprig bottom -->
  <g transform="translate(60,640)" stroke="#5C3B25" stroke-width="0.9" fill="none">
    <path d="M0,0 Q40,-20 80,-30 T160,-50"/>
    <ellipse cx="20" cy="-12" rx="9" ry="4" fill="#4A7A5A" transform="rotate(-25 20 -12)" stroke="none"/>
    <ellipse cx="50" cy="-22" rx="11" ry="5" fill="#2E5C3F" transform="rotate(-30 50 -22)" stroke="none"/>
    <ellipse cx="90" cy="-32" rx="10" ry="4" fill="#4A7A5A" transform="rotate(-32 90 -32)" stroke="none"/>
    <ellipse cx="125" cy="-42" rx="9" ry="4" fill="#2E5C3F" transform="rotate(-30 125 -42)" stroke="none"/>
    <circle cx="155" cy="-50" r="3" fill="#8B5E3C" stroke="none"/>
  </g>

  <text x="60" y="680" font-family="Cormorant Garamond, Georgia, serif" font-style="italic" font-size="14" fill="#4A3D32">
    Ferments · Salsas · Bitters · Cristalería
  </text>
  <text x="60" y="700" font-family="Cormorant Garamond, Georgia, serif" font-style="italic" font-size="12" fill="#7A6A58">
    Lo que ponemos en nuestras barras, ahora en la tuya.
  </text>

  <!-- vignette overlay -->
  <rect width="600" height="750" fill="url(#vignette)" pointer-events="none"/>
</svg>
