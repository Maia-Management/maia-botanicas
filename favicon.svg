  <line x1="256" y1="210" x2="202" y2="240" stroke="#87BC45" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <line x1="256" y1="250" x2="192" y2="270" stroke="#87BC45" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <line x1="256" y1="290" x2="202" y2="310" stroke="#87BC45" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
</svg>
