[build]
  publish = "."

[build.processing]
  skip_processing = false
[build.processing.css]
  bundle = true
  minify = true
[build.processing.js]
  bundle = true
  minify = true
[build.processing.html]
  pretty_urls = false
[build.processing.images]
  compress = true

# ===== REDIRECTS =====
[[redirects]]
  from = "https://www.maia-botanicas.com/*"
  to = "https://maia-botanicas.com/:splat"
  status = 301
  force = true

# Legacy ?lang=en URLs → real /en/ routes (Spanish-default site, English split-out 2026-05-24).
# Must come before the page-level redirects below so the query match wins.
[[redirects]]
  from = "/"
  query = { lang = "en" }
  to = "/en/"
  status = 301
  force = true

